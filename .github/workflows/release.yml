name: Build and Release LStack

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Read version ────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Validate tag matches package.json
        if: github.event_name == 'push'
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.ver.outputs.version }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} != v${{ steps.ver.outputs.version }}"
            exit 1
          fi

  # ─── Windows build ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app (unpacked only)
        run: npx vite build && npx electron-builder --win --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build WPF installer (embedded payload)
        run: |
          .\build\build-wpf-installer.ps1 `
            -AppVersion "${{ needs.prepare.outputs.version }}" `
            -WinUnpacked "${{ github.workspace }}\release\win-unpacked"
        shell: pwsh

      - name: Rename installer with version
        run: |
          $src = "release_test\wpf-test\LStack Setup.exe"
          $dst = "LStack-${{ needs.prepare.outputs.version }}-Setup.exe"
          Move-Item $src $dst
        shell: pwsh

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: lstack-windows-${{ needs.prepare.outputs.version }}
          path: LStack-${{ needs.prepare.outputs.version }}-Setup.exe

  # ─── Linux build ─────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm fakeroot dpkg \
            libx11-dev libxext-dev libxss-dev \
            libxcursor-dev libxi-dev libxtst-dev \
            libpango1.0-dev python3 make g++

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Linux
        run: npx electron-rebuild -f -m node_modules/node-pty

      - name: Build Vite + package Linux
        run: npx vite build && npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lstack-linux-${{ needs.prepare.outputs.version }}
          path: |
            release/*.AppImage
            release/*.deb

  # ─── Create GitHub release ───────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows, build-linux]
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lstack-windows-${{ needs.prepare.outputs.version }}
          path: dist-release

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: lstack-linux-${{ needs.prepare.outputs.version }}
          path: dist-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: LStack v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            dist-release/*.exe
            dist-release/*.AppImage
            dist-release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
